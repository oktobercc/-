<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading OS - 阅读</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/reader.css">
</head>

<body class="reader-page">

<header class="reader-toolbar">
    <div class="toolbar-left">
        <button class="reader-btn" onclick="closeReader()">←</button>
        <span class="reader-book-title" id="reader-title">正在加载...</span>
    </div>

    <div class="toolbar-right">
        <button class="reader-btn" onclick="decreaseFont()">A-</button>
        <button class="reader-btn" onclick="increaseFont()">A+</button>
        <button class="reader-btn" onclick="darkMode()">☾</button>
        <button class="reader-btn" onclick="fullScreen()">⛶</button>
    </div>
</header>

<main class="reader-main">
    <button class="page-button left" onclick="prevPage()">‹</button>

    <div id="reader" class="reader-content">
        <div class="loading">正在打开书籍...</div>
    </div>

    <button class="page-button right" onclick="nextPage()">›</button>
</main>

<footer class="reader-footer">
    <div class="progress-container">
        <div class="reader-progress" id="reader-progress"></div>
    </div>
    <div class="reader-info">
        <span id="reading-progress-text">0%</span>
    </div>
</footer>

<script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/reader.js"></script>

</body>
</html>
