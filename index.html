<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页间集</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
</head>
<body class="light">

<!-- 侧边栏 - Instagram风格 -->
<nav class="sidebar">
  <div class="logo">
    <h1>⋄</h1>
    <span class="logo-text">页间集</span>
  </div>
  
  <div class="nav-items">
    <div class="nav-item active" onclick="switchView('gallery')">
      <span class="nav-icon">☁</span>
      <span class="nav-label">书架</span>
    </div>
    <div class="nav-item" onclick="switchView('dashboard')">
      <span class="nav-icon">☢</span>
      <span class="nav-label">仪表盘</span>
    </div>
    <div class="nav-item" onclick="switchView('calendar')">
      <span class="nav-icon">☃</span>
      <span class="nav-label">日历</span>
    </div>
  </div>
  
  <div class="nav-footer">
    <div class="nav-item" onclick="toggleTheme()">
      <span class="nav-icon">☪</span>
      <span class="nav-label">主题</span>
    </div>
  </div>
</nav>

<!-- Main -->
<div class="main">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <h2 id="viewTitle">书架</h2>
    </div>
    <div class="topbar-right">
      <input type="text" id="search" placeholder="搜索书名 / 标签..." oninput="searchBooks()">
      <button onclick="addBook()" class="add-btn">＋ 添加</button>
      <button onclick="showStorageInfo()" class="storage-btn">💾</button>
    </div>
  </div>

  <!-- Views -->
  <div id="gallery" class="view active">
    <div class="books-grid" id="booksGrid"></div>
  </div>
  <div id="dashboard" class="view">
    <div class="dashboard-content">
      <h2>阅读统计</h2>
      <div id="statsContainer">
        <p style="color:#999;">正在开发中...</p>
      </div>
    </div>
  </div>
  <div id="calendar" class="view">
    <div class="calendar-content">
      <h2>阅读日历</h2>
      <div id="calendarContainer">
        <p style="color:#999;">正在开发中...</p>
      </div>
    </div>
  </div>
</div>

<!-- Drawer -->
<div id="drawer" class="drawer hidden">
  <div class="drawer-content" id="drawerContent"></div>
</div>

<!-- Reader -->
<div id="reader" class="reader hidden">
  <div class="reader-bar">
    <button onclick="closeReader()">← 返回</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>
  <div id="viewer"></div>
</div>

<script>
  // ========== 简单的 JS 功能模拟（保持与原有逻辑一致） ==========
  // 注意：此部分仅为让按钮和交互可工作，实际存储逻辑在 storage.js / app.js 中
  // 此处提供基本的占位函数，避免点击报错

  window.switchView = function(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(view).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    // 简单高亮对应 nav-item (根据 icon 或 label 粗略匹配)
    const labels = {
      'gallery': '书架',
      'dashboard': '仪表盘',
      'calendar': '日历'
    };
    document.querySelectorAll('.nav-item .nav-label').forEach(label => {
      if (label.textContent === labels[view]) {
        label.closest('.nav-item').classList.add('active');
      }
    });
    document.getElementById('viewTitle').textContent = labels[view] || '书架';
  };

  window.addBook = function() {
    alert('添加书籍功能 (演示)');
  };

  window.searchBooks = function() {
    // 搜索演示
  };

  window.showStorageInfo = function() {
    alert('存储信息 (演示)');
  };

  window.toggleTheme = function() {
    document.body.classList.toggle('dark');
  };

  window.closeReader = function() {
    document.getElementById('reader').classList.add('hidden');
  };

  // 模拟一些书籍卡片
  (function renderDemoBooks() {
    const grid = document.getElementById('booksGrid');
    const demoBooks = [
      { title: '百年孤独', author: '加西亚·马尔克斯', status: 'reading' },
      { title: '活着', author: '余华', status: 'read' },
      { title: '三体', author: '刘慈欣', status: 'unread' },
      { title: '红楼梦', author: '曹雪芹', status: 'reading' },
    ];
    grid.innerHTML = demoBooks.map(book => `
      <div class="book-card" onclick="alert('打开书籍: ${book.title}')">
        <div class="book-cover" style="background: #e8ddd0; display:flex; align-items:center; justify-content:center; font-size:32px; color:#b0a090;">📖</div>
        <div class="book-info">
          <div class="book-title">${book.title}</div>
          <div class="book-author">${book.author}</div>
          <span class="book-status status-${book.status}">${({unread:'未读',reading:'在读',read:'已读',abandoned:'弃读'})[book.status] || '未读'}</span>
        </div>
      </div>
    `).join('');
  })();
</script>
</body>
</html>
