<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页间集</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
</head>
<body class="light">

<!-- ===== 侧边栏 ===== -->
<nav class="sidebar">
  <div class="logo">
    <h1>♤</h1>
  </div>
  <div class="nav-items">
    <div class="nav-item active" data-view="gallery">
      <span class="nav-icon">☁</span>
      <span class="nav-label">书架</span>
    </div>
    <div class="nav-item" data-view="dashboard">
      <span class="nav-icon">☢</span>
      <span class="nav-label">仪表盘</span>
    </div>
    <div class="nav-item" data-view="calendar">
      <span class="nav-icon">☃</span>
      <span class="nav-label">日历</span>
    </div>
  </div>
  <div class="nav-footer">
    <div class="nav-item" id="themeToggle">
      <span class="nav-icon">☪</span>
      <span class="nav-label">主题</span>
    </div>
  </div>
</nav>

<!-- ===== 主区域 ===== -->
<div class="main">
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <h2 id="viewTitle">书架</h2>
    </div>
    <div class="topbar-right">
      <input type="text" id="search" placeholder="搜索书名 / 标签..." />
      <button id="addBookBtn" class="add-btn">＋ 添加</button>
      <button id="storageInfoBtn" class="storage-btn">💾</button>
    </div>
  </header>

  <!-- 视图容器 -->
  <div id="gallery" class="view active">
    <div class="books-grid" id="booksGrid"></div>
  </div>
  <div id="dashboard" class="view">
    <div class="dashboard-content">
      <h2>阅读统计</h2>
      <div id="statsContainer"><p style="color:#999;">正在开发中...</p></div>
    </div>
  </div>
  <div id="calendar" class="view">
    <div class="calendar-content">
      <h2>阅读日历</h2>
      <div id="calendarContainer"><p style="color:#999;">正在开发中...</p></div>
    </div>
  </div>
</div>

<!-- ===== 抽屉（详情/编辑） ===== -->
<div id="drawer" class="drawer hidden">
  <div class="drawer-content" id="drawerContent"></div>
</div>

<!-- ===== 阅读器 ===== -->
<div id="reader" class="reader hidden">
  <div class="reader-bar">
    <button id="closeReaderBtn">← 返回</button>
    <button id="readerThemeBtn">🌙</button>
  </div>
  <div id="viewer"></div>
</div>

<script src="storage.js"></script>
<script src="app.js"></script>
</body>
</html>
