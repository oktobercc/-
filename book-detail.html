<!DOCTYPE html>
<html lang="zh-CN">

<head>


<meta charset="UTF-8">


<meta name="viewport"
content="width=device-width, initial-scale=1.0">



<title>
Reading OS - 书籍详情
</title>



<!-- 全局样式 -->

<link rel="stylesheet" href="css/main.css">



<!-- 侧边栏 -->

<link rel="stylesheet" href="css/sidebar.css">



<!-- 详情页样式 -->

<link rel="stylesheet" href="css/detail.css">



</head>




<body>





<!-- ===============================
     顶部导航
================================ -->


<header class="top-bar">


    <button
    class="back-button"
    onclick="backShelf()">

        ←

    </button>



    <h2>

        书籍详情

    </h2>


</header>









<!-- ===============================
     页面主体
================================ -->


<main class="detail-container">





    <!-- 左侧封面 -->


    <div class="detail-cover">


        <img

        id="book-cover"

        src="assets/default-cover.jpg"

        alt="book cover">


    </div>









    <!-- 右侧信息 -->


    <section class="detail-info">





        <!-- 书名 -->


        <h1

        class="detail-title"

        id="book-title">

            加载中...


        </h1>







        <!-- 作者 -->


        <div

        class="detail-author"

        id="book-author">


            未知作者


        </div>









        <!-- 基础信息 -->


        <div class="detail-meta">



            <div class="meta-item">


                <span class="meta-label">

                    出版社

                </span>


                <span

                class="meta-value"

                id="book-publisher">

                    未知


                </span>


            </div>






            <div class="meta-item">


                <span class="meta-label">

                    出版年份

                </span>


                <span

                class="meta-value"

                id="book-year">


                    未知


                </span>


            </div>






            <div class="meta-item">


                <span class="meta-label">

                    格式

                </span>


                <span

                class="meta-value"

                id="book-type">


                    EPUB


                </span>


            </div>






            <div class="meta-item">


                <span class="meta-label">

                    状态

                </span>


                <span

                class="meta-value"

                id="book-status">


                    未读


                </span>


            </div>



        </div>









        <!-- 标签 -->


        <div

        class="detail-tags"

        id="book-tags">



        </div>









        <!-- 简介 -->


        <div class="detail-description">


            <div class="description-title">


                内容简介


            </div>



            <p

            id="book-description">


                暂无简介


            </p>



        </div>









        <!-- 阅读进度 -->


        <div class="detail-progress">



            <div class="progress-header">


                <span>

                    阅读进度

                </span>



                <span

                id="book-progress">

                    0%

                </span>



            </div>





            <div class="detail-progress-bar">


                <div

                class="detail-progress-value"

                id="progress-value">


                </div>


            </div>



        </div>









        <!-- 操作按钮 -->


        <div class="detail-actions">



            <button

            class="read-button"

            onclick="startReading()">



                开始阅读



            </button>







            <button

            class="favorite-button"

            onclick="toggleFavorite()">



                ☆



            </button>




        </div>






    </section>





</main>









<!-- ===============================
     阅读统计
================================ -->


<section class="detail-stat">



    <div class="stat-card">


        <div

        class="stat-number"

        id="read-time">

            0分钟


        </div>


        <div class="stat-label">

            阅读时间

        </div>


    </div>







    <div class="stat-card">


        <div

        class="stat-number"

        id="read-count">


            0


        </div>


        <div class="stat-label">

            阅读次数

        </div>


    </div>







    <div class="stat-card">


        <div

        class="stat-number"

        id="note-count">


            0


        </div>


        <div class="stat-label">

            笔记数量

        </div>


    </div>




</section>









<!-- ===============================
     JS
================================ -->


<script src="js/storage.js"></script>


<script src="js/detail.js"></script>



</body>


</html>
